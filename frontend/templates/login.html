{% extends 'base.html' %}

{% block title %}Login - SkinGuard AI{% endblock %}

{% block content %}
<div class="glass-card auth-form">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Welcome Back</h2>
    
    <form method="POST" action="{{ url_for('login') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Enter username">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Enter password">
        </div>
        
        <button type="submit" class="primary-btn submit-btn">Login to Account</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Don't have an account? <a href="{{ url_for('register') }}" style="color: var(--accent-blue); text-decoration: none;">Register here</a>
    </p>
</div>
{% endblock %}
