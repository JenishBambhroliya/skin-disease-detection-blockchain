{% extends 'base.html' %}

{% block title %}Register - SkinGuard AI{% endblock %}

{% block content %}
<div class="glass-card auth-form">
    <h2 style="text-align: center; margin-bottom: 1.5rem;">Create an Account</h2>
    
    <form method="POST" action="{{ url_for('register') }}">
        <div class="form-group">
            <label for="username">Username</label>
            <input type="text" id="username" name="username" class="form-control" required placeholder="Choose a username">
        </div>

        <div class="form-group">
            <label for="email">Email Address</label>
            <input type="email" id="email" name="email" class="form-control" required placeholder="name@example.com">
        </div>
        
        <div class="form-group">
            <label for="password">Password</label>
            <input type="password" id="password" name="password" class="form-control" required placeholder="Create a secure password">
        </div>
        
        <button type="submit" class="primary-btn submit-btn">Register</button>
    </form>
    
    <p style="text-align: center; margin-top: 1.5rem; color: var(--text-muted);">
        Already have an account? <a href="{{ url_for('login') }}" style="color: var(--accent-blue); text-decoration: none;">Login here</a>
    </p>
</div>
{% endblock %}
